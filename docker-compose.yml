version: '3.8'

services:
  aliexpress-products-api:
    build: .
    ports:
      - "30014:30014"
    environment:
      - PORT=30014
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ALIEXPRESS_PRODUCTS_API_KEY=${ALIEXPRESS_PRODUCTS_API_KEY:-dev-aliexpress-products-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30014/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
